# ===========================
# Application Configuration
# ===========================
spring.application.name=JobPortal

# ===========================
# H2 In-Memory Database (default - works without any install)
# ===========================
spring.datasource.url=jdbc:h2:mem:jobportaldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ===========================
# Thymeleaf
# ===========================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ===========================
# Server
# ===========================
server.port=8080

# ===========================
# File Upload
# ===========================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ===========================
# Logging
# ===========================
logging.level.com.jobportal=INFO

