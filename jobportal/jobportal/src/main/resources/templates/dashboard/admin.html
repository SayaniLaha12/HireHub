<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><title>Admin Dashboard — HireHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
    <div class="container nav-inner">
        <a th:href="@{/}" class="logo"><span class="logo-icon">⬡</span> HireHub</a>
        <div class="nav-auth">
            <div class="user-menu">
                <a th:href="@{/profile}" class="user-chip"><span class="avatar">A</span>Admin</a>
                <a th:href="@{/logout}" class="btn btn-ghost btn-sm">Logout</a>
            </div>
        </div>
    </div>
</nav>
<div class="container" style="padding:2rem 0;">
    <h2 style="margin-bottom:1.5rem;">⚙️ Admin Dashboard</h2>
    <div class="stats-grid mb-4">
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-briefcase"></i></div>
            <div class="stat-info"><div class="num" th:text="${totalJobs}">0</div><div class="label">Total Jobs</div></div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-users"></i></div>
            <div class="stat-info"><div class="num" th:text="${totalUsers}">0</div><div class="label">Total Users</div></div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-paper-plane"></i></div>
            <div class="stat-info"><div class="num" th:text="${totalApplications}">0</div><div class="label">Applications</div></div>
        </div>
    </div>
    <div class="card">
        <h3 style="margin-bottom:1rem;">Quick Links</h3>
        <div style="display:flex;gap:1rem;flex-wrap:wrap;">
            <a th:href="@{/jobs}" class="btn btn-outline">View All Jobs</a>
            <a th:href="@{/h2-console}" target="_blank" class="btn btn-ghost">H2 Database Console</a>
        </div>
    </div>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
