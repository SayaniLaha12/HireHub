<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Browse Jobs — HireHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
    <div class="container nav-inner">
        <a th:href="@{/}" class="logo"><span class="logo-icon">⬡</span> HireHub</a>
        <ul class="nav-links">
            <li><a th:href="@{/}">Home</a></li>
            <li><a th:href="@{/jobs}" class="active">Browse Jobs</a></li>
            <li sec:authorize="isAuthenticated()"><a th:href="@{/dashboard}">Dashboard</a></li>
        </ul>
        <div class="nav-auth">
            <div sec:authorize="isAnonymous()">
                <a th:href="@{/login}" class="btn btn-ghost">Login</a>
                <a th:href="@{/register}" class="btn btn-primary">Get Started</a>
            </div>
            <div sec:authorize="isAuthenticated()" class="user-menu">
                <a th:href="@{/profile}" class="user-chip"><span class="avatar">U</span><span sec:authentication="name"></span></a>
                <a th:href="@{/logout}" class="btn btn-ghost btn-sm">Logout</a>
            </div>
        </div>
        <button class="menu-toggle" onclick="toggleMenu()">☰</button>
    </div>
</nav>

<div style="background:var(--bg-secondary);border-bottom:1px solid var(--border);padding:2.5rem 0;">
    <div class="container">
        <h1 style="font-size:2rem;margin-bottom:.5rem;">Browse Jobs</h1>
        <p th:text="'Showing ' + ${totalJobs} + ' job listings'">All Jobs</p>

        <form th:action="@{/jobs}" method="get" style="margin-top:1.5rem;">
            <div class="search-bar">
                <div class="search-field">
                    <i class="fas fa-search"></i>
                    <input type="text" name="keyword" th:value="${keyword}" placeholder="Job title, skill, company..."/>
                </div>
                <div class="search-divider"></div>
                <div class="search-field">
                    <i class="fas fa-map-marker-alt"></i>
                    <input type="text" name="location" th:value="${location}" placeholder="Location or Remote"/>
                </div>
                <div class="search-divider"></div>
                <div class="search-field">
                    <i class="fas fa-tag"></i>
                    <input type="text" name="category" th:value="${category}" placeholder="Category (IT, Finance...)"/>
                </div>
                <div class="search-divider"></div>
                <div class="search-field">
                    <i class="fas fa-briefcase"></i>
                    <select name="jobType">
                        <option value="">All Types</option>
                        <option th:each="type : ${jobTypes}"
                                th:value="${type}"
                                th:text="${type.displayName}"
                                th:selected="${type == jobType}">Type</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Search</button>
                <a th:href="@{/jobs}" class="btn btn-ghost">Clear</a>
            </div>
        </form>
    </div>
</div>

<div class="section-sm">
    <div class="container">
        <div th:if="${!jobs.isEmpty()}">
            <div class="jobs-grid">
                <div class="job-card" th:each="job : ${jobs}">
                    <div class="job-card-header">
                        <div class="company-info">
                            <h4><a th:href="@{/jobs/{id}(id=${job.id})}" style="color:var(--text-primary);" th:text="${job.title}">Job Title</a></h4>
                            <div class="company-name"><i class="fas fa-building" style="margin-right:.3rem;"></i><span th:text="${job.company}">Company</span></div>
                        </div>
                        <span class="job-type-badge" th:text="${job.jobType.displayName}">Type</span>
                    </div>
                    <div class="job-card-meta">
                        <span class="meta-tag"><i class="fas fa-map-marker-alt"></i> <span th:text="${job.location}">Location</span></span>
                        <span class="meta-tag"><i class="fas fa-layer-group"></i> <span th:text="${job.experienceLevel.displayName}">Level</span></span>
                        <span class="meta-tag" th:if="${job.category}"><i class="fas fa-tag"></i> <span th:text="${job.category}">Category</span></span>
                        <span class="meta-tag"><i class="fas fa-users"></i> <span th:text="${job.vacancies + ' vacancies'}">1</span></span>
                    </div>
                    <p style="font-size:.85rem;color:var(--text-muted);margin:.6rem 0;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;" th:text="${#strings.abbreviate(job.description, 120)}">Description</p>
                    <div class="job-card-footer">
                        <span class="salary-tag" th:if="${job.salaryRange}" th:text="${job.salaryRange}">Salary</span>
                        <span class="salary-tag" th:unless="${job.salaryRange}">Competitive</span>
                        <a th:href="@{/jobs/{id}(id=${job.id})}" class="btn btn-primary btn-sm">Apply Now</a>
                    </div>
                </div>
            </div>

            <!-- Pagination -->
            <div class="pagination" th:if="${totalPages > 1}">
                <a th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                   th:href="@{/jobs(keyword=${keyword},location=${location},category=${category},jobType=${jobType},page=${i})}"
                   class="page-btn"
                   th:classappend="${i == currentPage ? ' active' : ''}"
                   th:text="${i + 1}">1</a>
            </div>
        </div>

        <div class="empty-state" th:if="${jobs.isEmpty()}">
            <i class="fas fa-search"></i>
            <h3>No jobs found</h3>
            <p>Try adjusting your search filters.</p>
            <a th:href="@{/jobs}" class="btn btn-outline mt-2">Clear Filters</a>
        </div>
    </div>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
