<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Edit Profile — HireHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
    <div class="container nav-inner">
        <a th:href="@{/}" class="logo"><span class="logo-icon">⬡</span> HireHub</a>
        <ul class="nav-links">
            <li><a th:href="@{/dashboard}">Dashboard</a></li>
            <li><a th:href="@{/jobs}">Browse Jobs</a></li>
        </ul>
        <div class="nav-auth">
            <div class="user-menu">
                <a th:href="@{/logout}" class="btn btn-ghost btn-sm">Logout</a>
            </div>
        </div>
    </div>
</nav>

<div class="container" style="padding:2.5rem 0 4rem;">
    <div style="max-width:680px;margin:0 auto;">
        <div style="margin-bottom:2rem;">
            <a th:href="@{/dashboard}" style="color:var(--text-muted);font-size:.85rem;">← Back to Dashboard</a>
            <h2 style="margin-top:.8rem;">Edit Profile</h2>
        </div>

        <div th:if="${success}" class="alert alert-success"><i class="fas fa-check-circle"></i> <span th:text="${success}"></span></div>

        <form th:action="@{/profile}" method="post" th:object="${user}">
            <!-- Personal Info -->
            <div class="card mb-3">
                <h3 style="margin-bottom:1.2rem;"><span class="text-accent">01.</span> Personal Information</h3>

                <div style="display:flex;align-items:center;gap:1.2rem;margin-bottom:1.5rem;padding-bottom:1.2rem;border-bottom:1px solid var(--border);">
                    <div style="width:72px;height:72px;border-radius:50%;background:var(--accent);color:#000;font-weight:800;font-size:1.6rem;display:flex;align-items:center;justify-content:center;"
                         th:text="${#strings.substring(user.firstName,0,1)}">U</div>
                    <div>
                        <h4 th:text="${user.fullName}">Name</h4>
                        <p style="font-size:.85rem;color:var(--text-muted);" th:text="${user.email}">email</p>
                        <span style="font-size:.75rem;" th:text="${user.role}">ROLE</span>
                    </div>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">First Name</label>
                        <input type="text" th:field="*{firstName}" class="form-control" required/>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Last Name</label>
                        <input type="text" th:field="*{lastName}" class="form-control" required/>
                    </div>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">Phone</label>
                        <input type="text" th:field="*{phone}" class="form-control" placeholder="+91-98765..."/>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Location</label>
                        <input type="text" th:field="*{location}" class="form-control" placeholder="City, Country"/>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Profile Summary</label>
                    <textarea th:field="*{profileSummary}" class="form-control" rows="3"
                              placeholder="A brief description about yourself..."></textarea>
                </div>
            </div>

            <!-- Job Seeker specific -->
            <div class="card mb-3" sec:authorize="hasRole('JOB_SEEKER')">
                <h3 style="margin-bottom:1.2rem;"><span class="text-accent">02.</span> Skills &amp; Experience</h3>
                <div class="form-group">
                    <label class="form-label">Skills (comma-separated)</label>
                    <input type="text" th:field="*{skills}" class="form-control"
                           placeholder="e.g. Java, Spring Boot, React, MySQL, Docker"/>
                    <p style="font-size:.8rem;color:var(--text-muted);margin-top:.4rem;">These help employers find you.</p>
                </div>

                <!-- Skills preview -->
                <div th:if="${user.skills}" style="margin-top:.5rem;">
                    <div class="skills-list" id="skillsPreview">
                        <span class="skill-chip" th:each="skill : ${#strings.arraySplit(user.skills,',')}"
                              th:text="${#strings.trim(skill)}">Skill</span>
                    </div>
                </div>
            </div>

            <!-- Employer specific -->
            <div class="card mb-3" sec:authorize="hasRole('EMPLOYER')">
                <h3 style="margin-bottom:1.2rem;"><span class="text-accent">02.</span> Company Information</h3>
                <div class="form-group">
                    <label class="form-label">Company Name</label>
                    <input type="text" th:field="*{companyName}" class="form-control" placeholder="Your company name"/>
                </div>
                <div class="form-group">
                    <label class="form-label">Company Website</label>
                    <input type="url" th:field="*{companyWebsite}" class="form-control" placeholder="https://yourcompany.com"/>
                </div>
                <div class="form-group">
                    <label class="form-label">Company Description</label>
                    <textarea th:field="*{companyDescription}" class="form-control" rows="3"
                              placeholder="Tell candidates about your company culture and mission..."></textarea>
                </div>
            </div>

            <div style="display:flex;gap:1rem;justify-content:flex-end;">
                <a th:href="@{/dashboard}" class="btn btn-ghost">Cancel</a>
                <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Changes</button>
            </div>
        </form>
    </div>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
